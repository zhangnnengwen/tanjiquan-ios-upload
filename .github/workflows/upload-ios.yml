name: Upload iOS IPA

on:
  workflow_dispatch:

env:
  IPA_ENC_PATH: ipa/__UNI__15CD4B6_0618111726.ipa.enc
  IPA_PATH: /tmp/__UNI__15CD4B6_0618111726.ipa
  APP_IDENTIFIER: com.aihirehumans.tanjiquan

jobs:
  upload:
    name: Upload to App Store Connect
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify encrypted IPA exists
        shell: bash
        run: |
          test -f "$IPA_ENC_PATH"
          ls -lh "$IPA_ENC_PATH"

      - name: Install fastlane
        shell: bash
        run: |
          gem install fastlane -NV
          fastlane --version

      - name: Create App Store Connect API key file
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          ruby -rjson -e 'File.write("api_key.json", JSON.pretty_generate({
            key_id: ENV.fetch("ASC_KEY_ID"),
            issuer_id: ENV.fetch("ASC_ISSUER_ID"),
            key: ENV.fetch("ASC_PRIVATE_KEY"),
            duration: 1200,
            in_house: false
          }))'

      - name: Decrypt IPA
        shell: bash
        env:
          IPA_DECRYPT_PASSWORD: ${{ secrets.IPA_DECRYPT_PASSWORD }}
        run: |
          ruby scripts/decrypt_ipa.rb "$IPA_ENC_PATH" "$IPA_PATH"
          test -f "$IPA_PATH"
          ls -lh "$IPA_PATH"

      - name: Upload IPA to App Store Connect
        shell: bash
        run: |
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "api_key.json" \
            --app_identifier "$APP_IDENTIFIER" \
            --skip_waiting_for_build_processing true
